<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Phase 1 Task Product</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <aside class="sidebar">
      <div>
        <div class="eyebrow">Workspace</div>
        <h1 id="workspaceName">Task Product</h1>
      </div>
      <nav class="nav">
        <button class="nav-item active" data-section="tasks">Tasks</button>
        <button class="nav-item" data-section="notifications">Notifications</button>
        <button class="nav-item" data-section="billing">Billing</button>
      </nav>
      <div class="user-block">
        <div class="avatar" id="userAvatar">P</div>
        <div>
          <strong id="userName">Loading</strong>
          <span id="userRole">member</span>
        </div>
      </div>
    </aside>

    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Phase 1</p>
          <h2>Core Task Product</h2>
        </div>
        <div class="search-box">
          <input id="searchInput" type="search" placeholder="Search tasks and projects">
          <div id="searchResults" class="search-results hidden"></div>
        </div>
      </header>

      <section id="tasksSection" class="section active-section">
        <div class="toolbar">
          <label>
            Project
            <select id="projectFilter"></select>
          </label>
          <div class="segmented" role="tablist" aria-label="Task view">
            <button id="listMode" class="active" type="button">List</button>
            <button id="boardMode" type="button">Board</button>
          </div>
          <button id="newTaskButton" class="primary" type="button">New Task</button>
        </div>

        <div class="content-grid">
          <section class="task-surface">
            <div id="taskList" class="task-list"></div>
            <div id="taskBoard" class="board hidden"></div>
          </section>

          <aside class="detail-panel">
            <form id="taskForm">
              <div class="panel-heading">
                <h3 id="detailTitle">New Task</h3>
                <span id="taskIdLabel"></span>
              </div>
              <label>
                Title
                <input id="taskTitle" name="title" required>
              </label>
              <label>
                Description
                <textarea id="taskDescription" name="description" rows="5"></textarea>
              </label>
              <div class="two-col">
                <label>
                  Status
                  <select id="taskStatus" name="status">
                    <option value="todo">Todo</option>
                    <option value="in_progress">In progress</option>
                    <option value="blocked">Blocked</option>
                    <option value="done">Done</option>
                  </select>
                </label>
                <label>
                  Priority
                  <select id="taskPriority" name="priority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="urgent">Urgent</option>
                  </select>
                </label>
              </div>
              <div class="two-col">
                <label>
                  Assignee
                  <select id="taskAssignee" name="assignee_id"></select>
                </label>
                <label>
                  Due
                  <input id="taskDueDate" name="due_date" type="date">
                </label>
              </div>
              <button class="primary wide" type="submit">Save Task</button>
            </form>

            <div class="subpanel">
              <h4>Comments</h4>
              <div id="comments"></div>
              <form id="commentForm" class="inline-form">
                <input id="commentBody" placeholder="Add a comment">
                <button type="submit">Post</button>
              </form>
            </div>

            <div class="subpanel">
              <h4>Attachments</h4>
              <div id="attachments"></div>
              <form id="attachmentForm" class="inline-form stack">
                <input id="attachmentName" placeholder="File name">
                <input id="attachmentUrl" placeholder="URL">
                <button type="submit">Attach</button>
              </form>
            </div>
          </aside>
        </div>
      </section>

      <section id="notificationsSection" class="section">
        <div class="section-heading">
          <h3>Notifications</h3>
          <button id="refreshNotifications" type="button">Refresh</button>
        </div>
        <div id="notificationsList" class="stack-list"></div>
      </section>

      <section id="billingSection" class="section">
        <div class="section-heading">
          <h3>Billing Foundation</h3>
          <button id="checkoutButton" type="button">Create Checkout Intent</button>
        </div>
        <div id="billingAccount" class="billing-card"></div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
